services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD 未设置}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-nurse_training_system}
      MYSQL_USER: ${MYSQL_USER:-nursespace_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD 未设置}
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=256M
      --max-connections=150
      --slow-query-log=ON
      --long-query-time=2
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD 未设置}"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    networks:
      - nursespace-net

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD 未设置} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:?REDIS_PASSWORD 未设置} --no-auth-warning ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - nursespace-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USE_CHINA_MIRROR: ${USE_CHINA_MIRROR:-false}
    restart: always
    env_file:
      - .env
    environment:
      HF_ENDPOINT: https://hf-mirror.com
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD 未设置}@redis:6379/0
      RATELIMIT_STORAGE_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD 未设置}@redis:6379/1
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-5}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
    volumes:
      - app_uploads:/app/uploads
      - app_logs:/app/logs
      - app_cases:/app/案例
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - nursespace-net

  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-_}
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/certbot-webroot:/var/www/certbot
      - ./static:/usr/share/nginx/html/static:ro
      - app_uploads:/usr/share/nginx/html/uploads:ro
      - nginx_logs:/var/log/nginx:rw
    depends_on:
      app:
        condition: service_healthy
    networks:
      - nursespace-net

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  app_uploads:
    driver: local
  app_logs:
    driver: local
  nginx_logs:
    driver: local
  app_cases:
    driver: local

networks:
  nursespace-net:
    driver: bridge
