<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" content="智能护士培训平台，以真实临床案例为核心，结合AI评估与个性化学习路径">
    <meta name="keywords" content="护士培训,临床案例,医疗教育,AI评估,护理学习">
    <meta name="author" content="护士培训系统">
    <title>{% block title %}护士培训系统{% endblock %}</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" crossorigin="anonymous">
    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    
    {% block extra_css %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top navbar-modern" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); box-shadow: 0 8px 24px rgba(0,0,0,0.12);">
        <div class="container">
            <a class="navbar-brand" href="#" style="font-size: 1.5rem; font-weight: 700; color: white;">
                <i class="fas fa-user-nurse me-2"></i>
                护士培训系统
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    {% block nav_items %}{% endblock %}
                </ul>
                
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown" style="border-radius: 25px; padding: 8px 15px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);">
                            <i class="fas fa-user me-1"></i>
                            <span id="user-name">用户</span>
                        </a>
                        <ul class="dropdown-menu" style="border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); backdrop-filter: blur(20px); background: rgba(255,255,255,0.95);">
                            <li><a class="dropdown-item" href="#" onclick="showProfile()" style="border-radius: 10px; margin: 5px;">
                                <i class="fas fa-user-circle me-2 text-primary"></i>个人信息
                            </a></li>
                            <li><a class="dropdown-item" href="#" onclick="changePassword()" style="border-radius: 10px; margin: 5px;">
                                <i class="fas fa-key me-2 text-warning"></i>修改密码
                            </a></li>
                            <li><hr class="dropdown-divider" style="margin: 10px;"></li>
                            <li><a class="dropdown-item" href="#" onclick="logout()" style="border-radius: 10px; margin: 5px; color: #dc3545;">
                                <i class="fas fa-sign-out-alt me-2"></i>退出登录
                            </a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 主要内容 -->
    <main class="main-content-wrapper">
        <div class="row g-0">
            <!-- 侧边栏 -->
            <div class="col-md-3 col-lg-2 sidebar-col">
                <div class="sidebar-wrapper" style="background: rgba(255,255,255,0.95); border: 1px solid rgba(0,0,0,0.05); border-radius: 20px 0 0 20px; height: 100%; padding: 20px;">
                    <ul class="nav nav-pills flex-column">
                        {% block sidebar %}{% endblock %}
                    </ul>
                </div>
            </div>
            
            <!-- 内容区域 -->
            <div class="col-md-9 col-lg-10 content-col">
                <div class="content-wrapper">
                    <!-- 提示消息 -->
                    <div id="alert-container" class="container-fluid px-4 pt-3"></div>
                    
                    <div class="content-inner">
                        {% block content %}{% endblock %}
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 模态框容器 -->
    <div id="modal-container"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/common.js') }}"></script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
