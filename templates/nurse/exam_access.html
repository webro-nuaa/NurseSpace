<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考试入口 - NurseSpace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" crossorigin="anonymous">
    <link href="{{ url_for('static', filename='css/style.css', v=config.VERSION) }}" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-5">
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-body text-center p-4">
                        <i class="fas fa-clipboard-check fa-3x text-primary mb-3"></i>
                        <h4 class="mb-3" id="exam-title">加载中...</h4>
                        <p class="text-muted mb-2" id="exam-desc"></p>
                        <div class="mb-3">
                            <span class="badge bg-info me-2" id="exam-duration"></span>
                            <span class="badge bg-warning text-dark" id="exam-time"></span>
                        </div>
                        <div id="status-area" class="mt-3">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">加载中...</span>
                            </div>
                        </div>
                        <div id="action-area" class="mt-3" style="display:none;">
                            <a id="enter-btn" href="/nurse" class="btn btn-primary btn-lg w-100 rounded-pill">
                                <i class="fas fa-play me-2"></i>进入考试中心
                            </a>
                            <p class="text-muted mt-2 small">在考试中心找到该考试即可作答</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
    <script>
    var token = new URLSearchParams(window.location.search).get('token');
    var examId = new URLSearchParams(window.location.search).get('exam_id');

    if (!token || !examId) {
        $('#exam-title').text('无效链接');
        $('#status-area').html('<div class="alert alert-danger">考试链接无效，请联系管理员重新生成二维码</div>');
    } else {
        checkAuthAndLoad();
    }

    function checkAuthAndLoad() {
        $.ajax({
            url: '/nurse/exams'
        }).done(function(res) {
            if (res.success) {
                var exam = (res.data.exams || []).find(function(e) { return e.id == examId; });
                if (exam) {
                    showExam(exam);
                } else {
                    $('#exam-title').text('考试未找到');
                    $('#status-area').html('<div class="alert alert-warning">该考试可能已结束或尚未发布，请确认考试状态</div>');
                }
            } else {
                showLoginPrompt();
            }
        }).fail(function(xhr) {
            if (xhr.status === 401) {
                showLoginPrompt();
            } else {
                $('#exam-title').text('加载失败');
                $('#status-area').html('<div class="alert alert-danger">加载失败，请稍后重试</div>');
            }
        });
    }

    function showExam(exam) {
        $('#exam-title').text(exam.title);
        $('#exam-desc').text(exam.description || '');
        $('#exam-duration').text('时长 ' + exam.duration + ' 分钟');
        if (exam.end_time) {
            $('#exam-time').text('截止 ' + new Date(exam.end_time).toLocaleString('zh-CN'));
        }
        $('#status-area').hide();
        $('#action-area').show();
    }

    function showLoginPrompt() {
        $('#exam-title').text('需要登录');
        var currentUrl = '/nurse/exam-access?token=' + encodeURIComponent(token) + '&exam_id=' + encodeURIComponent(examId);
        var loginUrl = '/auth/login?next=' + encodeURIComponent(currentUrl);
        $('#status-area').html(
            '<div class="alert alert-info">请先登录后再进入考试<br>' +
            '<a href="' + loginUrl + '" class="btn btn-primary btn-sm mt-2 rounded-pill">' +
            '<i class="fas fa-sign-in-alt me-1"></i>前往登录</a>' +
            '<p class="text-muted small mt-2 mb-0">登录后将自动返回此页面</p></div>'
        );
    }
    </script>
</body>
</html>
