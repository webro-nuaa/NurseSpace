name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: 生成 .env（测试密钥）
        run: |
          cat > .env <<'ENVEOF'
          SECRET_KEY=ci-test-secret-key-not-for-production
          JWT_SECRET_KEY=ci-test-jwt-key-not-for-production
          MYSQL_HOST=db
          MYSQL_PORT=3306
          MYSQL_USER=nursespace_app
          MYSQL_PASSWORD=CiTest2024
          MYSQL_DATABASE=nurse_training_system
          ADMIN_USERNAME=admin
          ADMIN_PASSWORD=admin123
          REDIS_PASSWORD=nursespace_redis
          ENCRYPTION_KEY=aH8YSLKsWdeMteeC0uENl9uvDapGMhXq1w2AFnsG1_k=
          REDIS_URL=redis://:nursespace_redis@redis:6379/0
          REDIS_ENABLED=1
          RATELIMIT_ENABLED=1
          RATELIMIT_STORAGE_URL=redis://:nursespace_redis@redis:6379/1
          DB_POOL_SIZE=5
          DB_MAX_OVERFLOW=5
          GUNICORN_WORKERS=2
          GUNICORN_THREADS=4
          ENVEOF
          chmod 600 .env

      - name: 调高 Nginx 限流（CI 测试用）
        run: |
          sed -i 's/rate=60r\/m/rate=600r\/m/' nginx/nginx.conf
          sed -i 's/burst=20/burst=200/' nginx/nginx.conf

      - name: 构建并启动服务
        run: |
          docker compose build --pull
          docker compose up -d
          echo "等待服务就绪..."
          for i in $(seq 1 90); do
            if curl -sf http://localhost/api/health > /dev/null 2>&1; then
              echo "✓ 服务就绪"
              break
            fi
            if [ $i -eq 90 ]; then
              echo "✗ 服务启动超时"
              docker compose logs --tail=50
              exit 1
            fi
            sleep 2
          done

      - name: 运行全功能测试
        run: |
          chmod +x test_system.sh
          bash test_system.sh

      - name: 收集失败日志
        if: failure()
        run: |
          echo "=== App Logs ==="
          docker compose logs app --tail=100
          echo "=== Nginx Logs ==="
          docker compose logs nginx --tail=50
          echo "=== Diagnostic: failing endpoints ==="
          ADMIN_LOGIN=$(curl -s -X POST http://localhost/auth/login -H "Content-Type: application/json" -d '{"username":"admin","password":"admin123"}')
          ADMIN_JWT=$(echo "$ADMIN_LOGIN" | python3 -c "import sys,json; print(json.load(sys.stdin).get('access_token',''))" 2>/dev/null)
          echo "--- GET /admin/exams ---"
          curl -sv http://localhost/admin/exams -H "Authorization: Bearer $ADMIN_JWT" 2>&1
          echo "--- GET /nurse/dashboard ---"
          NURSE_LOGIN=$(curl -s -X POST http://localhost/auth/login -H "Content-Type: application/json" -d '{"username":"tester_nurse","password":"Test#2024Z"}')
          NURSE_JWT=$(echo "$NURSE_LOGIN" | python3 -c "import sys,json; print(json.load(sys.stdin).get('access_token',''))" 2>/dev/null)
          curl -sv http://localhost/nurse/dashboard -H "Authorization: Bearer $NURSE_JWT" 2>&1
          echo "--- PUT /admin/users/2 ---"
          curl -sv -X PUT http://localhost/admin/users/2 -H "Content-Type: application/json" -H "Authorization: Bearer $ADMIN_JWT" -d '{"department":"外科"}' 2>&1

      - name: 清理
        if: always()
        run: docker compose down -v
